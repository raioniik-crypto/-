services:
  - type: web
    name: structure-note-executor
    runtime: python
    rootDir: structure-note-executor
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_REPO
        sync: false
      - key: GITHUB_BRANCH
        value: main
      - key: GITHUB_VAULT_PATH
        value: ""
      - key: API_SECRET
        sync: false
